services:
  stateful-auth-db:
    container_name: stateful-auth-db
    image: postgres:latest
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - auth
    ports:
      - "5433:5432"

  token-redis:
    container_name: token-redis
    image: redis:latest
    ports:
      - "6379:6379"

  stateful-auth-api:
    build: './stateful/stateful-auth-api'
    container_name: stateful-auth-api
    depends_on:
      - stateful-auth-db
    environment:
      - PORT=8083
      - DB_HOST=stateful-auth-db
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    networks:
      - auth
    ports:
      - "8083:8083"
      
  stateful-any-api:
    build: './stateful/stateful-any-api'
    container_name: stateful-any-api
    environment:
      - PORT=8084
    networks:
      - auth
    ports:
      - "8084:8084"

networks:
  auth:
    driver: bridge
